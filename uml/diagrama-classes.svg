<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .box { fill: #fdfdfd; stroke: #1f2937; stroke-width: 2; }
    .title { font: bold 20px Arial; }
    .txt { font: 16px Arial; }
    .rel { stroke: #374151; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="80" y="70" width="280" height="150" class="box"/>
  <text x="100" y="100" class="title">Pessoa (abstrata)</text>
  <text x="100" y="135" class="txt">- nome: String</text>
  <text x="100" y="160" class="txt">- documento: String</text>
  <text x="100" y="195" class="txt">+ getters()</text>

  <rect x="60" y="290" width="300" height="180" class="box"/>
  <text x="80" y="320" class="title">Medico</text>
  <text x="80" y="355" class="txt">- crm: String</text>
  <text x="80" y="380" class="txt">- especialidade: String</text>
  <text x="80" y="415" class="txt">+ getCrm()</text>
  <text x="80" y="440" class="txt">+ getEspecialidade()</text>

  <rect x="420" y="290" width="320" height="160" class="box"/>
  <text x="440" y="320" class="title">Paciente</text>
  <text x="440" y="355" class="txt">- numeroConvenio: String</text>
  <text x="440" y="390" class="txt">+ getNumeroConvenio()</text>

  <rect x="800" y="70" width="320" height="170" class="box"/>
  <text x="820" y="100" class="title">Exame</text>
  <text x="820" y="135" class="txt">- nome: String</text>
  <text x="820" y="160" class="txt">- prazoDias: int (&gt;0)</text>
  <text x="820" y="195" class="txt">+ getNome()</text>
  <text x="820" y="220" class="txt">+ getPrazoDias()</text>

  <rect x="760" y="300" width="380" height="220" class="box"/>
  <text x="780" y="330" class="title">Consulta</text>
  <text x="780" y="365" class="txt">- paciente: Paciente</text>
  <text x="780" y="390" class="txt">- medico: Medico</text>
  <text x="780" y="415" class="txt">- dataHora: LocalDateTime</text>
  <text x="780" y="440" class="txt">- compareceu: boolean</text>
  <text x="780" y="475" class="txt">+ registrarComparecimento()</text>
  <text x="780" y="500" class="txt">Regra: não marcar no passado</text>

  <rect x="90" y="540" width="500" height="180" class="box"/>
  <text x="110" y="570" class="title">HistoricoClinico</text>
  <text x="110" y="605" class="txt">- paciente: Paciente</text>
  <text x="110" y="630" class="txt">- registros: List&lt;String&gt;</text>
  <text x="110" y="665" class="txt">+ adicionarRegistro(texto)</text>
  <text x="110" y="690" class="txt">Regra: texto não pode ser vazio</text>

  <rect x="640" y="550" width="500" height="170" class="box"/>
  <text x="660" y="580" class="title">SistemaClinica</text>
  <text x="660" y="615" class="txt">- medicos, pacientes, exames, consultas</text>
  <text x="660" y="640" class="txt">- historicosPorDocumento</text>
  <text x="660" y="675" class="txt">+ cadastrar/agendar/registrar/listar</text>

  <line x1="210" y1="220" x2="210" y2="290" class="rel"/>
  <line x1="250" y1="220" x2="530" y2="290" class="rel"/>
  <line x1="740" y1="360" x2="760" y2="360" class="rel"/>
  <line x1="360" y1="360" x2="760" y2="390" class="rel"/>
  <line x1="580" y1="370" x2="760" y2="415" class="rel"/>
  <line x1="340" y1="450" x2="280" y2="540" class="rel"/>
  <line x1="560" y1="360" x2="900" y2="550" class="rel"/>
  <line x1="960" y1="240" x2="960" y2="550" class="rel"/>
</svg>
